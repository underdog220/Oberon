<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oberon Admin</title>
    <style>
        :root { --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #c0caf5; --muted: #565f89; --blue: #7aa2f7; --green: #9ece6a; --red: #f7768e; --yellow: #e0af68; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        h1 { color: var(--blue); margin-bottom: 8px; font-size: 1.5em; }
        h2 { color: var(--blue); margin: 20px 0 10px; font-size: 1.1em; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .status-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; min-width: 140px; }
        .stat .label { font-size: 0.75em; color: var(--muted); text-transform: uppercase; }
        .stat .value { font-size: 1.4em; font-weight: bold; margin-top: 4px; }
        .stat .value.ok { color: var(--green); }
        .stat .value.warn { color: var(--yellow); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { text-align: left; color: var(--muted); font-weight: normal; padding: 6px 8px; border-bottom: 1px solid var(--border); }
        td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(122,162,247,0.05); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; }
        .badge.system { background: rgba(122,162,247,0.2); color: var(--blue); }
        .badge.gutachten { background: rgba(224,175,104,0.2); color: var(--yellow); }
        .badge.active { background: rgba(158,206,106,0.2); color: var(--green); }
        .badge.archived { background: rgba(86,95,137,0.2); color: var(--muted); }
        .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
        input[type="text"], input[type="password"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 0.85em; }
        button { background: var(--blue); color: var(--bg); border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
        button:hover { opacity: 0.9; }
        button.secondary { background: var(--border); color: var(--text); }
        .error { color: var(--red); font-size: 0.85em; margin-top: 4px; }
        .timestamp { color: var(--muted); font-size: 0.75em; }
        #loading { text-align: center; padding: 40px; color: var(--muted); }
    </style>
</head>
<body>
    <h1>Oberon Admin</h1>
    <div class="toolbar">
        <input type="text" id="serverUrl" placeholder="Server URL" style="width:220px">
        <input type="password" id="apiToken" placeholder="API Token" style="width:180px">
        <button onclick="connect()">Verbinden</button>
        <span id="connStatus" style="align-self:center; font-size:0.85em"></span>
    </div>

    <div id="loading">Nicht verbunden — Token eingeben und verbinden.</div>
    <div id="content" style="display:none">
        <div class="status-bar" id="statusBar"></div>
        <div class="grid">
            <div>
                <h2>Virtuelle Instanzen</h2>
                <div class="panel" id="instancesPanel"><table><tbody id="instancesBody"></tbody></table></div>
            </div>
            <div>
                <h2>Memory-Eintraege</h2>
                <div class="toolbar">
                    <input type="text" id="memSearch" placeholder="Suche..." style="flex:1">
                    <button onclick="searchMemory()">Suchen</button>
                </div>
                <div class="panel" id="memoryPanel"><table><tbody id="memoryBody"></tbody></table></div>
            </div>
            <div>
                <h2>Clients</h2>
                <div class="panel" id="clientsPanel"><table><tbody id="clientsBody"></tbody></table></div>
            </div>
            <div>
                <h2>Audit-Log (letzte 30)</h2>
                <div class="panel" id="auditPanel"><table><tbody id="auditBody"></tbody></table></div>
            </div>
        </div>

        <h2>LLM-Konfiguration</h2>
        <div class="panel">
            <div id="llmStatus" style="margin-bottom: 12px;"></div>
            <div class="toolbar" style="flex-wrap: wrap;">
                <input type="password" id="llmApiKey" placeholder="OpenAI API-Key (sk-...)" style="flex:1; min-width:250px">
                <button onclick="saveLlmKey()">Speichern</button>
                <button class="secondary" onclick="removeLlmKey()">Entfernen</button>
            </div>
            <div class="toolbar" style="flex-wrap: wrap; margin-top: 8px;">
                <input type="text" id="llmBaseUrl" placeholder="Base-URL (optional, Standard: OpenAI)" style="flex:1; min-width:200px">
                <input type="text" id="llmModel" placeholder="Modell (optional, z.B. gpt-4o)" style="width:180px">
                <button onclick="saveLlmConfig()">Konfiguration aktualisieren</button>
            </div>
            <div class="toolbar" style="margin-top: 12px;">
                <input type="text" id="llmTestPrompt" placeholder="Test-Prompt eingeben..." style="flex:1">
                <button onclick="testLlm()">LLM testen</button>
            </div>
            <div id="llmTestResult" style="margin-top: 8px; font-size: 0.85em; white-space: pre-wrap;"></div>
        </div>
    </div>

<script>
let BASE = '', TOKEN = '';
// Auto-detect server URL from current page location
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('serverUrl').value = window.location.origin || 'http://localhost:17900';
});

function api(path) {
    return fetch(BASE + path, { headers: { 'Authorization': 'Bearer ' + TOKEN } }).then(r => r.json());
}

async function connect() {
    BASE = document.getElementById('serverUrl').value.replace(/\/$/, '');
    TOKEN = document.getElementById('apiToken').value;
    const status = document.getElementById('connStatus');
    try {
        const data = await api('/api/v2/platform/status');
        if (data.status === 'ok') {
            status.innerHTML = '<span style="color:var(--green)">Verbunden (' + data.server + ')</span>';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            refresh(data);
        } else {
            status.innerHTML = '<span style="color:var(--red)">Fehler: ' + JSON.stringify(data) + '</span>';
        }
    } catch (e) {
        status.innerHTML = '<span style="color:var(--red)">Nicht erreichbar: ' + e.message + '</span>';
    }
}

async function refresh(statusData) {
    renderStatus(statusData || await api('/api/v2/platform/status'));
    renderInstances(await api('/api/v2/instances'));
    renderMemory(await api('/api/v2/memory'));
    renderClients(await api('/api/v2/clients'));
    renderAudit(await api('/api/v2/audit?limit=30'));
    loadLlmConfig();
}

function renderStatus(d) {
    document.getElementById('statusBar').innerHTML = [
        stat('Status', d.status, d.status === 'ok' ? 'ok' : 'warn'),
        stat('Instanzen', d.activeInstances + ' / ' + d.virtualInstances, 'ok'),
        stat('Clients', d.registeredClients, ''),
        stat('Sync', d.syncMode, d.syncMode === 'SYNCED' ? 'ok' : d.syncMode === 'OFFLINE' ? 'warn' : ''),
        stat('Pending', d.syncPending, d.syncPending > 0 ? 'warn' : 'ok'),
        stat('Domains', (d.domains || []).join(', '), ''),
    ].join('');
}

function stat(label, value, cls) {
    return '<div class="stat"><div class="label">' + label + '</div><div class="value ' + cls + '">' + value + '</div></div>';
}

function renderInstances(d) {
    const rows = (d.instances || []).map(i =>
        '<tr><td>' + i.label + '</td><td><span class="badge ' + i.domain.toLowerCase() + '">' + i.domain + '</span></td>' +
        '<td><span class="badge ' + i.status.toLowerCase() + '">' + i.status + '</span></td>' +
        '<td>' + i.instanceType + '</td><td class="timestamp">' + ts(i.lastActiveAtEpochMillis) + '</td></tr>'
    );
    document.getElementById('instancesBody').innerHTML =
        '<tr><th>Label</th><th>Domain</th><th>Status</th><th>Typ</th><th>Letzte Aktivitaet</th></tr>' + rows.join('');
}

function renderMemory(d) {
    const rows = (d.entries || []).map(e =>
        '<tr><td>' + e.title + '</td><td><span class="badge ' + (e.domain||'system').toLowerCase() + '">' + (e.domain||'') + '</span></td>' +
        '<td>' + e.memoryKind + '</td><td>' + (e.content||'').substring(0,80) + '</td></tr>'
    );
    document.getElementById('memoryBody').innerHTML =
        '<tr><th>Titel</th><th>Domain</th><th>Typ</th><th>Inhalt</th></tr>' + rows.join('');
}

function renderClients(d) {
    const rows = (d.clients || []).map(c =>
        '<tr><td>' + c.clientName + '</td><td>' + c.clientKind + '</td><td>' + (c.isActive ? 'Aktiv' : 'Inaktiv') + '</td>' +
        '<td class="timestamp">' + (c.lastSeenAtEpochMillis ? ts(c.lastSeenAtEpochMillis) : '—') + '</td></tr>'
    );
    document.getElementById('clientsBody').innerHTML =
        '<tr><th>Name</th><th>Typ</th><th>Status</th><th>Zuletzt gesehen</th></tr>' + rows.join('');
}

function renderAudit(d) {
    const rows = (d.entries || []).map(e =>
        '<tr><td>' + e.action + '</td><td>' + e.resourcePath + '</td><td>' + e.responseCode + '</td>' +
        '<td>' + (e.durationMillis || '—') + 'ms</td><td class="timestamp">' + ts(e.createdAtEpochMillis) + '</td></tr>'
    );
    document.getElementById('auditBody').innerHTML =
        '<tr><th>Aktion</th><th>Pfad</th><th>Code</th><th>Dauer</th><th>Zeit</th></tr>' + rows.join('');
}

async function searchMemory() {
    const q = document.getElementById('memSearch').value;
    if (!q) { renderMemory(await api('/api/v2/memory')); return; }
    renderMemory(await api('/api/v2/memory?q=' + encodeURIComponent(q)));
}

function ts(epoch) {
    if (!epoch) return '';
    return new Date(epoch).toLocaleString('de-DE', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
}

// --- LLM-Konfiguration ---

async function loadLlmConfig() {
    try {
        const data = await api('/api/v2/admin/llm-config');
        const statusEl = document.getElementById('llmStatus');
        const keyHint = data.apiKeyHint || '(nicht gesetzt)';
        const model = data.model || '(Standard)';
        const baseUrl = data.baseUrl || '(Standard: OpenAI)';
        const hasKey = keyHint !== '(nicht gesetzt)' && keyHint !== '' && keyHint !== 'nicht gesetzt';

        statusEl.innerHTML =
            '<div class="status-bar">' +
            stat('API-Key', keyHint, hasKey ? 'ok' : 'warn') +
            stat('Modell', model, '') +
            stat('Base-URL', baseUrl, '') +
            '</div>';

        if (data.baseUrl) document.getElementById('llmBaseUrl').value = data.baseUrl;
        if (data.model) document.getElementById('llmModel').value = data.model;
    } catch (e) {
        document.getElementById('llmStatus').innerHTML =
            '<span class="error">LLM-Config nicht abrufbar: ' + e.message + '</span>';
    }
}

async function saveLlmKey() {
    const key = document.getElementById('llmApiKey').value.trim();
    if (!key) { alert('Bitte API-Key eingeben'); return; }

    try {
        const resp = await fetch(BASE + '/api/v2/admin/llm-config', {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({ apiKey: key })
        });
        const data = await resp.json();
        document.getElementById('llmApiKey').value = '';
        loadLlmConfig();
        alert('API-Key gespeichert!');
    } catch (e) {
        alert('Fehler: ' + e.message);
    }
}

async function saveLlmConfig() {
    const body = {};
    const baseUrl = document.getElementById('llmBaseUrl').value.trim();
    const model = document.getElementById('llmModel').value.trim();
    if (baseUrl) body.baseUrl = baseUrl;
    if (model) body.model = model;
    if (Object.keys(body).length === 0) { alert('Bitte mindestens ein Feld ausfuellen'); return; }

    try {
        await fetch(BASE + '/api/v2/admin/llm-config', {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        loadLlmConfig();
        alert('Konfiguration aktualisiert!');
    } catch (e) {
        alert('Fehler: ' + e.message);
    }
}

async function removeLlmKey() {
    if (!confirm('API-Key wirklich entfernen?')) return;
    try {
        await fetch(BASE + '/api/v2/admin/llm-config', {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + TOKEN }
        });
        loadLlmConfig();
        alert('API-Key entfernt.');
    } catch (e) {
        alert('Fehler: ' + e.message);
    }
}

async function testLlm() {
    const prompt = document.getElementById('llmTestPrompt').value.trim();
    if (!prompt) { alert('Bitte Test-Prompt eingeben'); return; }
    const resultEl = document.getElementById('llmTestResult');
    resultEl.innerHTML = '<span style="color:var(--muted)">Sende an LLM...</span>';

    try {
        const resp = await fetch(BASE + '/api/v2/chat', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: prompt, domain: 'SYSTEM' })
        });
        const data = await resp.json();
        if (data.error) {
            resultEl.innerHTML = '<span class="error">Fehler: ' + data.error + '</span>';
        } else {
            resultEl.innerHTML = '<span style="color:var(--green)">Antwort:</span>\n' + (data.reply || data.response || JSON.stringify(data, null, 2));
        }
    } catch (e) {
        resultEl.innerHTML = '<span class="error">Fehler: ' + e.message + '</span>';
    }
}
</script>
</body>
</html>
