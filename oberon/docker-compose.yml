version: "3.8"

services:
  oberon:
    build: .
    container_name: oberon
    restart: unless-stopped
    ports:
      - "17900:17900"
    volumes:
      - oberon-data:/data
    environment:
      - OBERON_PORT=17900
      - OBERON_HOST=0.0.0.0
      - OBERON_TOKEN=${OBERON_TOKEN:-mein-sicheres-token}
      - OBERON_DOMAINS=SYSTEM,GUTACHTEN
      - OBERON_DATA_DIR=/data
      - OBERON_OPENAI_API_KEY=${OBERON_OPENAI_API_KEY:-}
      - OBERON_OPENAI_MODEL=${OBERON_OPENAI_MODEL:-gpt-4o-mini}
      - OBERON_MSSQL_JDBC_URL=${OBERON_MSSQL_JDBC_URL:-}
    healthcheck:
      test: ["CMD", "java", "-cp", "/app/oberon.jar", "-e", ""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  oberon-data:
    driver: local
